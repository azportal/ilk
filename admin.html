<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzPortal Admin Panel</title>
    <style>
        :root { --primary: #d32f2f; --secondary: #1976d2; --bg: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .hidden { display: none; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; font-size: 22px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 13px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 15px; }
        .btn-login { background: var(--primary); color: white; }
        .btn-save { background: var(--secondary); color: white; margin-top: 10px; }
        .btn-view { background: #444; color: white; margin-top: 8px; text-decoration: none; display: block; text-align: center; line-height: 1.5; }
        .status { text-align: center; font-size: 14px; margin-top: 15px; font-weight: bold; }
        label { font-size: 12px; color: #666; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="loginBox" class="box">
        <h2>🔒 Admin Giriş</h2>
        <input type="password" id="adminPass" placeholder="Şifrəni daxil edin...">
        <button class="btn-login" onclick="checkLogin()">Giriş Et</button>
        <p id="error" style="color:red; font-size:12px; text-align:center; margin-top:10px;"></p>
    </div>

    <div id="adminPanel" class="box hidden">
        <h2>🛠 İdarəetmə Paneli</h2>
        
        <label>Dəyişmək istədiyiniz bölmə:</label>
        <select id="itemSelect"></select>

        <label>Yeni Başlıq (Məs: 📥 Pro Versiya):</label>
        <input type="text" id="newName" placeholder="Yeni adı bura yazın...">
        
        <label>Məzmun/Linklər (HTML dəstəklənir):</label>
        <textarea id="newContent" placeholder="Bölmənin içində görünəcək mətn və ya linklər..." rows="6"></textarea>
        
        <button class="btn-save" onclick="saveChanges()">💾 Dəyişiklikləri Saxla</button>
        <a href="index.html" class="btn-view">🌐 Sayta Get</a>
        
        <div class="status" id="statusMsg"></div>
        <button onclick="location.reload()" style="background:transparent; color:#999; font-size:11px; margin-top:20px; border:1px solid #ddd;">Çıxış (Sessiyanı bağla)</button>
    </div>

    <script>
        // Sizin təyin etdiyiniz şifrə
        const SECRET_KEY = "033@Tural"; 

        function checkLogin() {
            const passInput = document.getElementById('adminPass').value;
            if(passInput === SECRET_KEY) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadDropdown();
            } else {
                document.getElementById('error').textContent = "Səhv şifrə! Yenidən yoxlayın.";
            }
        }

        // 1-dən 80-ə qədər bölmələri siyahıya salırıq
        function loadDropdown() {
            const select = document.getElementById('itemSelect');
            for(let i=1; i<=80; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.textContent = "Bölmə " + i;
                select.appendChild(opt);
            }
        }

        function saveChanges() {
            const id = document.getElementById('itemSelect').value;
            const name = document.getElementById('newName').value;
            const content = document.getElementById('newContent').value;
            const status = document.getElementById('statusMsg');

            if(!name && !content) {
                alert("Heç olmasa bir sahəni doldurun!");
                return;
            }

            // LocalStorage-a obyekt kimi yazırıq
            const updateData = {
                title: name,
                body: content
            };
            
            localStorage.setItem('azportal_update_' + id, JSON.stringify(updateData));
            
            status.style.color = "green";
            status.textContent = "✅ Uğurla yadda saxlanıldı!";
            
            // 2 saniyə sonra mesajı sil
            setTimeout(() => { status.textContent = ""; }, 2500);
        }
    </script>
</body>
</html>
