<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Download</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:linear-gradient(135deg,#ff2e2e,#0066ff);
}

.box{
background:rgba(0,0,0,0.45);
padding:40px;
border-radius:12px;
text-align:center;
width:350px;
}

button{
padding:12px 25px;
border:none;
border-radius:6px;
font-size:16px;
background:#ff2e2e;
color:white;
cursor:not-allowed;
opacity:0.6;
}

button.active{
background:#0066ff;
cursor:pointer;
opacity:1;
}

</style>

</head>

<body>

<div class="box">

<h2>Fayl hazırlanır</h2>

<p>Download düyməsi <span id="time">10</span> saniyə sonra aktiv olacaq</p>

<button id="downloadBtn" disabled onclick="downloadFile()">
Download
</button>

</div>

<script>

let time = 10;
let btn = document.getElementById("downloadBtn");

let countdown = setInterval(function(){

time--;
document.getElementById("time").innerText = time;

if(time <= 0){

clearInterval(countdown);

btn.disabled = false;
btn.classList.add("active");

}

},1000);

function downloadFile(){
window.location.href="file.zip";
}

</script>

</body>
</html>
