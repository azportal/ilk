  <title>https://azportal.github.io/ilk/</title>
  
  <style>
    :root{
      --bg:#fff5f5; --panel:#ffffff; --accent:#d32f2f; --accent-alt:#1976d2; --touch:#ffe0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body{margin:0; background:var(--bg); color:#0b1822;}
    header { position:fixed; top:0; left:0; right:0; height:56px; display:flex; align-items:center; padding:8px 12px; background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%); z-index:1000; color:#fff; }
    .wrap { max-width:720px; margin:0 auto; padding:72px 12px 100px; }
    .searchbar { display:flex; gap:6px; margin-bottom:15px; }
    .searchbar input { flex:1; padding:10px; border-radius:8px; border:2px solid var(--accent); }
    .list-section { background:#fff; margin-bottom:12px; border-radius:8px; border-top:3px solid var(--accent); padding:10px; }
    ul.menu { list-style:none; padding:0; }
    li.menu-item { border-bottom:1px solid #eee; }
    a.menu-link { display:flex; padding:12px; text-decoration:none; color:inherit; font-weight:500; }
    .num { width:30px; color:var(--accent); font-weight:bold; }
    #contentArea { display:none; background:#fff; padding:15px; border-radius:8px; border:3px solid var(--accent); }
    .btn { padding:12px; border-radius:6px; background:var(--accent); color:#fff; text-align:center; text-decoration:none; display:block; font-weight:bold; margin-top:15px; }
    .back-btn { display:inline-block; margin-bottom:10px; color:var(--accent-alt); text-decoration:none; font-weight:bold; }
    footer { position:fixed; bottom:0; width:100%; background:#fff; border-top:1px solid #ddd; padding:10px; text-align:center; font-size:12px; }
  </style>
</head>
<body>

<header><div style="font-weight:900;">https://azportal.github.io/ilk/</div></header>

<main class="wrap">
  <div id="mainView">
    <div class="searchbar">
      <input id="searchInput" type="search" placeholder="Axtar..." />
    </div>
    <div id="menuContainer"></div>
  </div>
  
  <div id="contentArea"></div>
</main>

<script>
const translations = { az: { m1:"📥 Whatsapp Plus", m2:"📥 Instagram Plus", m3:"📥 Youtube Plus", m4:"📥 TikTok Plus", m5:"🔐 ArgoVPN Pro", m10:"ℹ️ İnformasiya" /* Digər 80-ə qədər bura yazıla bilər */ } };
const categories = { "Əsas Bölmələr": [1,2,3,4,5,10] }; // Nümunə üçün bir neçə ID

function t(id) { return translations.az['m'+id] || "Bölmə " + id; }
function esc(s) { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function renderMenu(filter = '') {
  const container = document.getElementById('menuContainer');
  container.innerHTML = '';
  // 80 Bölməni dövr ilə yaradırıq
  let html = '<div class="list-section"><ul class="menu">';
  for(let i=1; i<=80; i++) {
    const title = t(i);
    if(title.toLowerCase().includes(filter.toLowerCase())) {
      html += `<li class="menu-item"><a href="#" class="menu-link" onclick="openSection(${i}); return false;"><span class="num">${i}</span>${esc(title)}</a></li>`;
    }
  }
  html += '</ul></div>';
  container.innerHTML = html;
}

function openSection(id) {
  const db = JSON.parse(localStorage.getItem('portal_db') || '{}');
  const custom = db[id] || {};
  
  document.getElementById('mainView').style.display = 'none';
  const area = document.getElementById('contentArea');
  area.style.display = 'block';
  
  area.innerHTML = `
    <a href="#" class="back-btn" onclick="closeSection(); return false;">⬅️ Geri qayıt</a>
    <h2>${id}. ${esc(custom.t || t(id))}</h2>
    <div style="white-space:pre-line; margin:15px 0;">${esc(custom.d || "Məlumat yoxdur.")}</div>
    <a href="${custom.l || '#'}" target="_blank" class="btn">📥 YÜKLƏ / GİRİŞ ET</a>
  `;
}

function closeSection() {
  document.getElementById('mainView').style.display = 'block';
  document.getElementById('contentArea').style.display = 'none';
}

document.getElementById('searchInput').addEventListener('input', e => renderMenu(e.target.value));
renderMenu();
</script>
</body>
</html>
