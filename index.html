    header {

      top:0;
      left:0;
      right:0;
      height:56px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:8px 12px;
      background:linear-gradient(#ffffff,#fbfdff);
      border-bottom:1px solid var(--border);
      z-index:1000;
    }
    .wrap { max-width:720px;margin:0 auto;padding:72px 12px 110px;} /* space for header/footer */
    .brand { font-weight:700;color:var(--accent); font-size:16px; }
    .datetime { font-size:13px; color:var(--muted); text-align:right; min-width:120px; }
    /* Language switcher */
    .lang-switch { display:flex; gap:6px; align-items:center; margin-left:8px; }
    .lang-btn { padding:4px 8px; border-radius:6px; border:1px solid var(--border); background:#fff; font-size:12px; cursor:pointer; color:var(--muted); }
    .lang-btn.active { background:var(--accent); color:#fff; font-weight:600; border-color:rgba(11,99,168,.9); }
    .searchbar { margin:6px 0 12px; display:flex; gap:8px; }
    .searchbar input{
      flex:1;padding:8px 10px;border-radius:6px;border:1px solid var(--border);font-size:14px;background:var(--panel);
    }
    .btn { display:inline-block;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:14px;color:var(--accent);cursor:pointer;text-decoration:none; text-align:center;}
    .list-section { margin:10px 0; border-top:1px solid var(--border); padding-top:10px; }
    .list-section h3 { margin:0 0 8px 0; font-size:14px; color:#0b2b44; }
    ul.menu { list-style:none;padding:0;margin:0; }
    li.menu-item { border-bottom:1px solid var(--border); background:var(--panel); }
    a.menu-link { display:flex; align-items:center; gap:10px; padding:10px 8px; color:inherit; text-decoration:none; font-size:15px; }
    a.menu-link:active { background:var(--touch); }
    .num { width:36px; color:var(--muted); flex-shrink:0; font-weight:600; }
    .title { flex:1; }
    .meta { font-size:12px; color:var(--muted); white-space:nowrap; }
    /* content area */
    #contentArea { display:none; padding:8px; background:var(--panel); border:1px solid var(--border); border-radius:6px; }
    .back-btn { display:inline-block;margin:8px 0;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:14px;color:var(--accent);text-decoration:none;cursor:pointer;}
    .card { padding:12px;border-radius:6px;border:1px solid #efefef;background:#fff; margin-bottom:10px; }
    label{ display:block; font-size:13px; margin:8px 0 4px; color:#123 }
    input[type="text"], input[type="number"], input[type="email"], select {
      width:100%; padding:8px 10px; border-radius:6px; border:1px solid var(--border); font-size:14px; background:#fff; box-sizing:border-box;
    }
    .small{ font-size:13px; color:var(--muted); margin-top:6px; }
    footer {
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:linear-gradient(#fff,#fbfdff);
      border-top:1px solid var(--border);
      padding:8px 12px;
      font-size:13px;
      color:var(--muted);
      display:flex;
      justify-content:center;
      gap:12px;
      z-index:1000;
    }
    /* overlay for messages */
    .overlayMsg {
      position:fixed; left:12px; right:12px; top:70px; z-index:1200; display:none;
      background:#fff; border:1px solid #ddd; box-shadow:0 6px 18px rgba(0,0,0,.08); padding:10px; border-radius:8px;
    }
    @media (max-width:420px){
      .num{width:34px}
      .brand{font-size:15px}
      header{height:56px;padding:8px}
      .wrap{padding:78px 10px 130px}

/* ---------- Language management ---------- */
const supported = ['az','tr','ru','ua','en'];
const defaultLang = 'az';
const storageKey = 'site_lang';

function getLangFromPath(){
  const seg = location.pathname.split('/').filter(Boolean);
  if(seg.length && supported.includes(seg[0])) return seg[0];
  return null;
}
function setLangInPath(lang){
  const seg = location.pathname.split('/').filter(Boolean);
  if(seg.length && supported.includes(seg[0])) seg[0] = lang;
  else seg.unshift(lang);
  const newPath = '/' + seg.join('/') + location.search + location.hash;
  history.replaceState({}, '', newPath);
}
function saveLang(lang){
  try{ localStorage.setItem(storageKey, lang); } catch(e){}
  document.cookie = "site_lang="+encodeURIComponent(lang)+"; path=/; max-age=" + (60*60*24*30);
}
function loadSavedLang(){
  try{
    const ls = localStorage.getItem(storageKey);
    if(ls && supported.includes(ls)) return ls;
  } catch(e){}
  const match = document.cookie.match(/(?:^|;\s*)site_lang=([^;]+)/);
  if(match){
    const c = decodeURIComponent(match[1]);
    if(supported.includes(c)) return c;
  }
  return null;
}
function getInitialLang(){
  const pathLang = getLangFromPath();
  if(pathLang) return pathLang;
  const saved = loadSavedLang();
  if(saved) return saved;
  const nav = (navigator.language || navigator.userLanguage || '').slice(0,2).toLowerCase();
  if(nav === 'tr') return 'tr';
  if(nav === 'ru') return 'ru';
  if(nav === 'uk' || nav === 'ua') return 'ua';
  if(nav === 'en') return 'en';
  return defaultLang;
}
let currentLang = getInitialLang();

/* ---------- i18n helpers ---------- */
function t(key){
  if(!translations[currentLang]) return key;
  return translations[currentLang][key] || key;
}
function applyStaticTranslations(){
  // static elements
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    el.innerHTML = t(k);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{
    const k = el.getAttribute('data-i18n-placeholder');
    el.setAttribute('placeholder', t(k));
  });
  // set search placeholder
  const q = document.getElementById('searchInput');
  if(q) q.setAttribute('placeholder', t('searchPlaceholder'));
  // clear button
  const clearBtn = document.getElementById('clearSearch');
  if(clearBtn) clearBtn.textContent = t('clearBtn');
}

/* ---------- Render menu ---------- */
const menuContainer = document.getElementById('menuContainer');
function menuLabelFor(i){
  const key = 'm'+i;
  return t(key);
}
function renderMenu(filterText = ''){
  menuContainer.innerHTML = '';
  Object.keys(categories).forEach(catName=>{
    const ids = categories[catName];
    const matched = ids.filter(i=>{
      const text = (menuLabelFor(i) || '').toLowerCase();
      if(!filterText) return true;
      const f = filterText.toLowerCase();
      return text.includes(f) || String(i).includes(f);
    });
    if(matched.length === 0) return;
    const sec = document.createElement('section');
    sec.className = 'list-section';
    const h = document.createElement('h3');
    h.textContent = catName;
    sec.appendChild(h);
    const ul = document.createElement('ul');
    ul.className = 'menu';
    matched.forEach(i=>{
      const li = document.createElement('li');
      li.className = 'menu-item';
      const a = document.createElement('a');
      a.className = 'menu-link';
      a.href = '#';
      a.dataset.id = i;
      a.innerHTML = `<span class="num">${i}</span><span class="title">${escapeHtml(menuLabelFor(i))}</span><span class="meta"></span>`;
      a.addEventListener('click', onItemClick);
      li.appendChild(a);
      ul.appendChild(li);
    });
    sec.appendChild(ul);
    menuContainer.appendChild(sec);
  });
}

/* ---------- Live clock ---------- */
function pad(n){return n<10? '0'+n : n}
function updateClock(){
  const d = new Date();
  const y = d.getFullYear();
  const mo = pad(d.getMonth()+1);
  const day = pad(d.getDate());
  const hh = pad(d.getHours());
  const mm = pad(d.getMinutes());
  const ss = pad(d.getSeconds());
  document.getElementById('liveDate').textContent = `${day}.${mo}.${y} ${hh}:${mm}:${ss}`;
}
updateClock();

      const place = geo.results[0];
      const lat = place.latitude, lon = place.longitude;
      const fResp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`);
      if(!fResp.ok) throw new Error('Forecast error');
      const f = await fResp.json();
      const cw = f.current_weather;
      out.innerHTML = `
        <div><strong>${escapeHtml(place.name)}, ${escapeHtml(place.country)}</strong></div>
        <div class="small">Lat: ${lat.toFixed(3)}, Lon: ${lon.toFixed(3)}</div>
        <div style="margin-top:8px"><strong>${escapeHtml(t('temperature') || 'Temperatur')}:</strong> ${cw.temperature} °C</div>

      `;
    } catch (err){
      out.innerHTML = `<div class="small" style="color:#c33">${escapeHtml(t('error') || 'Xəta')}: ${escapeHtml(err.message)}</div>`;
    }
  });
}

  if(!o['temperature']) o['temperature'] = (l==='tr'?'Sıcaklık':'Temperatur');
  if(!o['wind']) o['wind'] = (l==='tr'?'Rüzgar':'Rüzgar');
  if(!o['time']) o['time'] = (l==='tr'?'Zaman':'Məlumat vaxtı');
  if(!o['openMeteo']) o['openMeteo'] = 'Open-Meteo';
  if(!o['error']) o['error'] = (l==='tr'?'Hata':'Xəta');
});

/* ---------- Electricity section localized ---------- */
function renderElectricity(container){
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <strong>${escapeHtml(menuLabelFor(38))}</strong>
    <p class="small">${escapeHtml(t('elecNote') || 'Keçmiş və indiki sayğac oxunu daxil edin. Qiymət AZN/kWh daxil edin.')}</p>
    <label>${escapeHtml(t('prevLabel') || 'Keçmiş oxunu (kWh)')}</label>
    <input id="prev" type="number" min="0" step="0.1" />
    <label>${escapeHtml(t('currLabel') || 'İndiki oxunu (kWh)')}</label>
    <input id="curr" type="number" min="0" step="0.1" />
    <label>${escapeHtml(t('priceLabel') || 'Qiymət (AZN/kWh)')}</label>
    <input id="price" type="number" min="0" step="0.01" value="0.13" />
    <div style="margin-top:8px"><button id="calcBill" class="btn">${escapeHtml(t('calcBtn') || 'Hesabla')}</button></div>
    <div id="billResult" style="margin-top:10px"></div>
  `;
  container.appendChild(card);

  document.getElementById('calcBill').addEventListener('click', function(){
    const prev = parseFloat(document.getElementById('prev').value);
    const curr = parseFloat(document.getElementById('curr').value);
    const price = parseFloat(document.getElementById('price').value);
    const out = document.getElementById('billResult');
    out.innerHTML = '';
    if(isNaN(prev) || isNaN(curr) || isNaN(price)){ out.innerHTML = `<div class="small" style="color:#c33">${escapeHtml(t('fillAll') || 'Zəhmət olmasa bütün sahələri doldurun.')}</div>`; return; }
    if(curr < prev){ out.innerHTML = `<div class="small" style="color:#c33">${escapeHtml(t('currLessPrev') || 'İndiki oxunu keçmişdən kiçik ola bilməz.')}</div>`; return; }
    const consumption = curr - prev;
    const amount = consumption * price;
    out.innerHTML = `
      <div class="small"><strong>${escapeHtml(t('usage') || 'İstifadə')}:</strong> ${consumption.toFixed(2)} kWh</div>
      <div class="small"><strong>${escapeHtml(t('amount') || 'Məbləğ')}:</strong> ${amount.toFixed(2)} AZN</div>
      <div class="small">${escapeHtml(t('note') || 'Qeyd: Bu hesablamalar təxmini göstərir.')}</div>
    `;
  });
}
Object.keys(translations).forEach(l=>{
  const o = translations[l];
  if(!o['elecNote']) o['elecNote'] = (l==='tr'?'Geçmiş ve şu anki sayaç değerlerini girin. Fiyat AZN/kWh olarak.':'Keçmiş və indiki sayğac oxunu daxil edin. Qiymət AZN/kWh daxil edin.');
  if(!o['prevLabel']) o['prevLabel'] = (l==='tr'?'Önceki sayaç (kWh)':'Keçmiş oxunu (kWh)');
  if(!o['currLabel']) o['currLabel'] = (l==='tr'?'Şimdiki sayaç (kWh)':'İndiki oxunu (kWh)');
  if(!o['priceLabel']) o['priceLabel'] = (l==='tr'?'Fiyat (AZN/kWh)':'Qiymət (AZN/kWh)');
  if(!o['calcBtn']) o['calcBtn'] = (l==='tr'?'Hesapla':'Hesabla');
  if(!o['fillAll']) o['fillAll'] = (l==='tr'?'Lütfen tüm alanları doldurun.':'Zəhmət olmasa bütün sahələri doldurun.');

/* ---------- Overlay and helpers ---------- */
function showOverlay(msg, timeout=2000){
  const ov = document.getElementById('overlayMsg');
  ov.innerHTML = `<div style="font-size:14px">${escapeHtml(msg)}</div>`;
  ov.style.display = 'block';
  setTimeout(()=>{ ov.style.display = 'none'; }, timeout);
}
function escapeHtml(str){
  if(typeof str !== 'string') return str;
  return str.replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; });
}

/* ---------- Language buttons ---------- */
function updateLangButtons(){
  document.querySelectorAll('.lang-btn').forEach(btn=>{
    const l = btn.dataset.lang;
    if(l === currentLang) btn.classList.add('active'); else btn.classList.remove('active');
  });
}
document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click', function(){
    const lang = this.dataset.lang;
    if(!supported.includes(lang)) return;
    currentLang = lang;
    applyStaticTranslations();
    renderMenu(searchInput.value.trim());
    updateLangButtons();
    saveLang(lang);
    setLangInPath(lang);
    // update back button text if content visible
    document.querySelectorAll('.back-btn').forEach(b => b.textContent = '⬅️ ' + (t('backHome') || 'Ana Səhifəyə Qayıt'));
  });
});

/* ---------- Initial setup ---------- */
function init(){
  // Apply language
  if(!supported.includes(currentLang)) currentLang = defaultLang;
  applyStaticTranslations();
  updateLangButtons();
  renderMenu();
  setLangInPath(currentLang);
  saveLang(currentLang);
  // handle popstate (user manual navigation)
  window.addEventListener('popstate', () => {
    const pathLang = getLangFromPath();
    if(pathLang && pathLang !== currentLang){
      currentLang = pathLang;
      applyStaticTranslations();
      renderMenu(searchInput.value.trim());
      updateLangButtons();
    }
  });
  // focus search
  searchInput.focus();
}
init();

/* ---------- Keyboard numeric quick open (helpful) ---------- */
let typedNumber = '';
document.addEventListener('keydown', (e)=>{
  if(document.activeElement === document.getElementById('searchInput')) return;
  if(e.key >= '0' && e.key <= '9'){
    typedNumber += e.key;
    showOverlay((t('quickNumber')||'Nömrə')+': ' + typedNumber, 1200);
    if(typedNumber.length >= 2){ // try to open if two digits
      const id = Number(typedNumber);
      if(id >=1 && id <= 80){ openSection(id); typedNumber=''; }
    }
    clearTypedNumberDebounce();
  } else if(e.key === 'Enter' && typedNumber.length){
    const id = Number(typedNumber);
    if(id >=1 && id <= 80) openSection(id);
    typedNumber = '';
  } else if(e.key === 'Escape'){
    showMenu(); typedNumber='';
  }
});
let typedTimer = null;
function clearTypedNumberDebounce(){
  if(typedTimer) clearTimeout(typedTimer);
  typedTimer = setTimeout(()=>{ typedNumber=''; typedTimer=null; }, 2000);
}

/* Ensure some generic localized strings exist */
Object.keys(translations).forEach(l=>{
  if(!translations[l]['quickNumber']) translations[l]['quickNumber'] = (l==='tr'?'Numara':'Nömrə');
  if(!translations[l]['backHome']) translations[l]['backHome'] = (l==='tr'?'Ana Sayfaya Dön':'Ana Səhifəyə Qayıt');
});

/* Show menu initially */
showMenu();
