}

  return n<10 ? '0'+n : n; 
}

function updateClock() {
  const d = new Date();
  document.getElementById('liveDate').textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
updateClock();
setInterval(updateClock, 1000);

const menuContainer = document.getElementById('menuContainer');
const contentArea = document.getElementById('contentArea');
const searchInput = document.getElementById('searchInput');
const clearSearch = document.getElementById('clearSearch');

function renderMenu(filterText = '') {
  menuContainer.innerHTML = '';
  
  Object.keys(categories).forEach(catName => {
    const ids = categories[catName];
    const matched = ids.filter(i => {
      const text = (t('m'+i) || '').toLowerCase();
      if(!filterText) return true;
      return text.includes(filterText.toLowerCase()) || String(i).includes(filterText);
    });
    
    if(matched.length === 0) return;
    
    const sec = document.createElement('section');
    sec.className = 'list-section';
    
    const h = document.createElement('h3');
    h.textContent = catName;
    sec.appendChild(h);
    
    const ul = document.createElement('ul');
    ul.className = 'menu';
    
    matched.forEach(i => {
      const li = document.createElement('li');
      li.className = 'menu-item';
      const a = document.createElement('a');
      a.className = 'menu-link';
      a.href = '#';
      a.dataset.id = i;
      a.innerHTML = `<span class="num">${i}</span><span class="title">${esc(t('m'+i))}</span>`;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        openSection(i);
      });
      li.appendChild(a);
      ul.appendChild(li);
    });
    
    sec.appendChild(ul);
    menuContainer.appendChild(sec);
  });
}

function openSection(id) {
  contentArea.style.display = 'block';
  menuContainer.style.display = 'none';
  contentArea.innerHTML = `
    <a class="back-btn" href="#" onclick="return showMenu(event)">⬅️ Qayıt</a>
    <h2>${id}. ${esc(t('m'+id))}</h2>
    <div class="card">
      <p>${esc(t('m'+id))}</p>
      <p style="font-size:12px;color:#666;">Bu xidmət https://azportal.github.io/ilk/ portalında mövcuddur.</p>
    </div>
  `;
  window.scrollTo({top:0});
}

function showMenu(e) {
  if(e) e.preventDefault();
  contentArea.style.display = 'none';
  menuContainer.style.display = 'block';
  return false;
}

searchInput.addEventListener('input', () => {
  renderMenu(searchInput.value.trim());
});

clearSearch.addEventListener('click', () => {
  searchInput.value = '';
  renderMenu();
  searchInput.focus();
});

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const lang = this.dataset.lang;
    if(supported.includes(lang)) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      renderMenu(searchInput.value.trim());
    }
  });
});

// INITIALIZE
renderMenu();
document.querySelector('[data-lang="az"]').classList.add('active');
searchInput.focus();
</script>
</body>
</html>
