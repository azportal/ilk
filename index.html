<div id="top-header-container" style="background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; padding: 15px; font-family: sans-serif; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffd700;">
    
    <div>
        <div id="dynamic-greeting" style="font-weight: bold; font-size: 18px; margin-bottom: 5px;"></div>
        <div id="dynamic-date-time" style="font-size: 14px; opacity: 0.8;"></div>
    </div>

    <div>
        <select id="site-lang-select" onchange="changeSiteLanguage(this.value)" style="padding: 8px; border-radius: 5px; border: none; cursor: pointer; background: white; color: #333; font-weight: bold;">
            <option value="az">Azərbaycan 🇦🇿</option>
            <option value="tr">Türkçe 🇹🇷</option>
            <option value="en">English 🇬🇧</option>
            <option value="ru">Русский 🇷🇺</option>
            <option value="ua">Українська 🇺🇦</option>
            <option value="ge">ქართული 🇬🇪</option>
        </select>
    </div>
</div>

<div id="admin-dynamic-sections" style="margin: 20px 10px;">
    </div>

<div id="admin-ads-slot" style="margin: 20px 0; text-align: center;">
    </div>

<footer style="padding: 20px; background: #222; color: #bbb; text-align: center; font-size: 13px;">
    <div style="margin-bottom: 10px;">
        <a href="/sitemap.xml" style="color: #ffd700; text-decoration: none; margin: 0 10px;">Sistem Maps</a>
        <a href="https://maps.google.com" target="_blank" style="color: #ffd700; text-decoration: none; margin: 0 10px;">Google Maps Link</a>
    </div>
    <p>© 2026 AzPortal - Bütün hüquqlar qorunur.</p>
</footer>

<script>
const translations = {
    az: { morning: "Sabahınız xeyir", afternoon: "Günortanız xeyir", evening: "Axşamınız xeyir", night: "Gecəniz xeyrə", welcome: "saytımıza xoş gəldiniz!", locale: 'az-AZ' },
    tr: { morning: "Günaydın", afternoon: "Tünaydın", evening: "İyi akşamlar", night: "İyi geceler", welcome: "sitemize hoş geldiniz!", locale: 'tr-TR' },
    en: { morning: "Good morning", afternoon: "Good afternoon", evening: "Good evening", night: "Good night", welcome: "welcome to our site!", locale: 'en-US' },
    ru: { morning: "Доброе утро", afternoon: "Добрый день", evening: "Добрый вечер", night: "Доброй ночи", welcome: "добро пожаловать на наш сайт!", locale: 'ru-RU' },
    ua: { morning: "Доброго ранку", afternoon: "Доброго дня", evening: "Доброго вечора", night: "На добраніч", welcome: "ласкаво просимо на наш сайт!", locale: 'uk-UA' },
    ge: { morning: "დილა მშვიდობისა", afternoon: "მშვიდობიანი დღე", evening: "საღამო მშვიდობისა", night: "ღამე მშვიდობისა", welcome: "კეთილი იყოს თქვენი მობრძანება!", locale: 'ka-GE' }
};

let currentLang = 'az';

function changeSiteLanguage(lang) {
    currentLang = lang;
    updateDisplay();
}

function updateDisplay() {
    const now = new Date();
    const hours = now.getHours();
    const t = translations[currentLang];
    
    // Qarşılama tərcüməsi
    let greet = "";
    if (hours >= 5 && hours < 12) greet = t.morning;
    else if (hours >= 12 && hours < 18) greet = t.afternoon;
    else if (hours >= 18 && hours < 23) greet = t.evening;
    else greet = t.night;
    
    document.getElementById('dynamic-greeting').innerText = `${greet}, ${t.welcome}`;
    
    // Saat və Tarix tərcüməsi (Dinamik format)
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
    document.getElementById('dynamic-date-time').innerText = now.toLocaleDateString(t.locale, options);
}

setInterval(updateDisplay, 1000);
updateDisplay();
</script>
