<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AzPortal - Azərbaycanın Ən Böyük Portalı</title>
  <style>
    :root{
      --bg:#fff5f5; --panel:#ffffff; --muted:#666; --accent:#d32f2f;
      --accent-alt:#1976d2; --border:#ffcccc; --touch:#ffe0e0; --wa-color:#25D366;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color:#0b1822;
    }
    html,body{height:100%;margin:0;background:var(--bg);-webkit-text-size-adjust:100%;}
    header { position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%);z-index:1000;box-shadow:0 4px 12px rgba(211,47,47,0.3); }
    .wrap { max-width:720px;margin:0 auto;padding:72px 12px 180px;}
    .brand { font-weight:900;color:#ffffff; font-size:16px; }
    .searchbar { margin:6px 0 12px; display:flex; gap:6px; }
    .searchbar input{ flex:1;padding:10px 12px;border-radius:8px;border:2px solid var(--accent);font-size:14px;background:var(--panel);}
    .btn { padding:8px 12px;border-radius:6px;background:var(--accent);font-size:13px;color:#ffffff;border:none;cursor:pointer; }
    .list-section { margin:12px 0; border-top:3px solid var(--accent); padding:12px; background:white; border-radius:8px; }
    .list-section h3 { margin:0 0 10px 0; font-size:13px; color:var(--accent); text-transform:uppercase; }
    ul.menu { list-style:none;padding:0;margin:0; }
    li.menu-item { border-bottom:1px solid #eee; margin-bottom:6px; }
    a.menu-link { display:flex; align-items:center; gap:10px; padding:12px 10px; color:inherit; text-decoration:none; font-size:14px; }
    .num { width:32px; color:#d32f2f; font-weight:900; }
    #contentArea { display:none; padding:12px; background:var(--panel); border:3px solid var(--accent); border-radius:8px; }
    .back-btn { padding:8px 12px; background:var(--accent); color:white; text-decoration:none; border-radius:6px; display:inline-block; margin-bottom:10px; }
    footer { position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%);padding:12px;color:white;text-align:center;font-size:11px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">AzPortal.io</div>
    <div style="color:white; font-size:12px;" id="liveDate"></div>
  </header>

  <main class="wrap">
    <div class="searchbar">
      <input id="searchInput" type="search" placeholder="Axtar..." />
      <button onclick="location.href='admin.html'" class="btn" style="background:#444">Admin</button>
    </div>
    <div id="menuContainer"></div>
    <div id="contentArea"></div>
  </main>

  <footer>© 2023-2026 Azmi | Bütün hüquqlar qorunur</footer>

<script>
const translations = {
  az: {
    m1:"📥 Whatsapp Plus Yüklə", m2:"📥 Instagram Plus Yüklə", m3:"📥 Youtube Plus Yüklə", m4:"📥 TikTok Plus Yüklə", m5:"🔐 ArgoVPN Pro Yüklə",
    m6:"🖼 Silinmiş şəkillər", m7:"🎵 Mahnı Axtar", m8:"🔎 Şəkil Axtar", m9:"🔗 Linklər", m10:"ℹ️ İnfo",
    m11:"📚 Wikipedia", m12:"🔍 Axtarış", m13:"📱 Tanınmışlar", m14:"💊 Dərmanlar", m15:"🎬 Kinolar",
    m16:"📺 Seriallar", m17:"🕌 Quran (AZ)", m18:"🕌 Quran (TR)", m19:"🕌 Quran (RU)", m20:"🕌 Quran (AR)"
    // Digərləri eyni qaydada davam edir...
  }
};

const categories = {
  "📥 Yükləmələr": [1,2,3,4,5],
  "🎨 Media": [6,7,8],
  "🔍 Axtarış": [9,10,11,12],
  "🕌 Dini": [17,18,19,20]
};

let currentLang = 'az';
const menuContainer = document.getElementById('menuContainer');
const contentArea = document.getElementById('contentArea');

function t(key) { 
    // Admin dəyişikliyini yoxla
    const saved = localStorage.getItem('azportal_update_' + key.replace('m',''));
    if(saved) {
        const data = JSON.parse(saved);
        if(data.title) return data.title;
    }
    return translations[currentLang][key] || key; 
}

function renderMenu(filter = '') {
  menuContainer.innerHTML = '';
  Object.keys(categories).forEach(cat => {
    const matched = categories[cat].filter(i => t('m'+i).toLowerCase().includes(filter.toLowerCase()));
    if(matched.length === 0) return;
    let html = `<section class="list-section"><h3>${cat}</h3><ul class="menu">`;
    matched.forEach(i => {
      html += `<li class="menu-item"><a href="#" class="menu-link" onclick="openSection(${i});return false;"><span class="num">${i}</span><span class="title">${t('m'+i)}</span></a></li>`;
    });
    html += `</ul></section>`;
    menuContainer.innerHTML += html;
  });
}

function openSection(id) {
  contentArea.style.display = 'block';
  menuContainer.style.display = 'none';
  const saved = localStorage.getItem('azportal_update_' + id);
  let bodyText = "Məlumat tapılmadı.";
  
  if(saved) {
      bodyText = JSON.parse(saved).body || t('m'+id);
  } else {
      bodyText = "Bu bölmə üçün hələlik məlumat daxil edilməyib.";
  }

  contentArea.innerHTML = `<a class="back-btn" href="#" onclick="showMenu()">⬅️ Qayıt</a><h2>${t('m'+id)}</h2><div style="background:white;padding:15px;border-radius:8px;border:1px solid #ddd">${bodyText}</div>`;
}

function showMenu() { contentArea.style.display = 'none'; menuContainer.style.display = 'block'; }
document.getElementById('searchInput').addEventListener('input', (e) => renderMenu(e.target.value));
setInterval(() => { const d = new Date(); document.getElementById('liveDate').textContent = d.toLocaleTimeString(); }, 1000);

renderMenu();
</script>
</body>
</html>
