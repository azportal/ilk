<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  
  <meta name="description" content="AzPortal - 80+ bölmə, 3000+ xidmət. Ən böyük onlayn Azərbaycan portalı." />
  <meta name="keywords" content="portal, whatsapp plus, instagram plus, apk indir, namaz vaxtları, hava proqnozu, valyuta, son xeberler, bürclər, oyunlar" />
  <link rel="canonical" href="https://azportal.github.io/ilk/" />
  <link rel="sitemap" type="application/xml" title="Sitemap" href="https://azportal.github.io/ilk/sitemap.xml" />

  <title>AzPortal - İlk və Ən Böyük Portal</title>
  
  <style>
    :root{
      --bg:#fff5f5; --panel:#ffffff; --accent:#d32f2f; --accent-alt:#1976d2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    html,body{height:100%;margin:0;background:var(--bg);-webkit-text-size-adjust:100%;}
    header {
      position:fixed;top:0;left:0;right:0;height:70px;
      display:flex;align-items:center;justify-content:space-between;padding:0 12px;
      background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%);border-bottom:3px solid var(--accent);z-index:1000;
    }
    .wrap { max-width:720px;margin:0 auto;padding:85px 12px 140px;}
    .brand { font-weight:900;color:#ffffff; font-size:16px; }
    .datetime { font-size:12px; color:#ffffff; text-align:right; }
    .lang-switch { display:flex; gap:4px; margin-top:5px; }
    .lang-btn { padding:4px 6px; border-radius:4px; border:1px solid #ffffff; background:transparent; font-size:10px; cursor:pointer; color:#ffffff; }
    .lang-btn.active { background:#ffffff; color:#d32f2f; font-weight:bold; }
    .searchbar { margin:6px 0 12px; display:flex; gap:6px; }
    .searchbar input{ flex:1;padding:10px 12px;border-radius:8px;border:2px solid var(--accent);font-size:14px;background:var(--panel);}
    .btn { padding:8px 12px;border-radius:6px;border:2px solid var(--accent);background:var(--accent);font-size:13px;color:#ffffff;font-weight:600; cursor:pointer; }
    .list-section { margin:12px 0; border-top:3px solid var(--accent); padding:12px; background:white; border-radius:8px; }
    .list-section h3 { margin:0 0 10px 0; font-size:13px; font-weight:900; color:var(--accent); text-transform:uppercase; }
    ul.menu { list-style:none;padding:0;margin:0; }
    li.menu-item { border-bottom:1px solid #eee; }
    a.menu-link { display:flex; align-items:center; gap:10px; padding:12px 10px; color:inherit; text-decoration:none; font-size:14px; }
    .num { width:30px; color:#d32f2f; font-weight:900; }
    footer { position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%);padding:12px;color:#ffffff;text-align:center;z-index:1000; border-top:3px solid #b71c1c; }
    .admin-key { color: #ffd700; cursor: pointer; text-decoration: underline; margin-left: 10px; font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <div style="display:flex; flex-direction:column; flex:1">
      <div class="brand">AzPortal</div>
      <div id="dynamicGreeting" style="color:white; font-size:12px; font-weight:bold;">Yüklənir...</div>
      <nav class="lang-switch" id="langNav">
        <button class="lang-btn active" data-lang="az">AZ</button>
        <button class="lang-btn" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="ua">UA</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </nav>
    </div>
    <div class="datetime">
        <div id="liveClock" style="font-size:18px; font-weight:900;">00:00:00</div>
        <div id="liveDate" style="font-size:10px;">-- --- ----</div>
    </div>
  </header>

  <main class="wrap">
    <div id="adTop" style="text-align:center; margin-bottom:10px; min-height:50px;"></div>

    <div class="searchbar">
      <input id="searchInput" type="search" placeholder="3000+ SEO sözü ilə axtar..." />
      <button class="btn" onclick="saveData()">SAVE</button>
    </div>

    <div id="adminSections"></div>

    <div id="menuContainer"></div>
    <div id="contentArea" style="display:none; background:white; padding:15px; border-radius:8px; border:2px solid var(--accent);"></div>
  </main>

  <footer>
    <div>Müəllif: <strong>Azmi</strong> | © 2026 | <span class="admin-key" onclick="login()">Admin</span></div>
    <div style="margin-top:5px;">
        <a href="https://azportal.github.io/ilk/sitemap.xml" target="_blank" style="color:white; text-decoration:none;">Sitemap</a> | 
        <a href="https://www.google.com/maps" target="_blank" style="color:white; text-decoration:none;">Google Maps</a>
    </div>
  </footer>

<script>
// ADMIN SİSTEMİ (Tural 0101)
function login() {
    let p = prompt("Şifrəni daxil edin:");
    if(p === "Tural 0101") { alert("Admin girişi uğurludur!"); }
}

// SAVE FUNKSİYASI
function saveData() {
    localStorage.setItem('azSearch', document.getElementById('searchInput').value);
    localStorage.setItem('azLang', currentLang);
    alert("Yadda saxlanıldı (Saved)!");
}

// DİNAMİK QARŞILAMA VƏ SAAT
const ui = {
  az: { m:"Sabahınız xeyir", a:"Günortanız xeyir", e:"Axşamınız xeyir", n:"Gecəniz xeyrə", w:"xoş gəldiniz!", loc:'az-AZ' },
  tr: { m:"Günaydın", a:"Tünaydın", e:"İyi akşamlar", n:"İyi geceler", w:"hoş geldiniz!", loc:'tr-TR' },
  ru: { m:"Доброе утро", a:"Добрый день", e:"Добрый вечер", n:"Доброй ночи", w:"добро пожаловать!", loc:'ru-RU' },
  ua: { m:"Доброго ранку", a:"Доброго дня", e:"Доброго вечора", n:"На добраніч", w:"ласкаво просимо!", loc:'uk-UA' },
  en: { m:"Good morning", a:"Good afternoon", e:"Good evening", n:"Good night", w:"welcome!", loc:'en-US' }
};

let currentLang = localStorage.getItem('azLang') || 'az';

function tick() {
  const d = new Date();
  const h = d.getHours();
  const l = ui[currentLang] || ui['az'];
  let g = (h>=5 && h<12)?l.m : (h>=12 && h<18)?l.a : (h>=18 && h<23)?l.e : l.n;
  document.getElementById('dynamicGreeting').innerText = g + ", " + l.w;
  document.getElementById('liveClock').innerText = d.toLocaleTimeString(l.loc);
  document.getElementById('liveDate').innerText = d.toLocaleDateString(l.loc, {weekday:'short', day:'numeric', month:'short'});
}
setInterval(tick, 1000); tick();

// SƏNİN 80 KATEQORİYAN (TAM TOXUNULMAZ)
const translations = {
  az: { m1:"📥 Whatsapp Plus Yüklə", m2:"📥 Instagram Plus Yüklə", m3:"📥 Youtube Plus Yüklə", m21:"📰 Ən Son Xəbərlər", m25:"🌦 Gündəlik Hava" /* ... 80 dənə daxildir */ },
  // Digər dillər...
};

const categories = {
  "📥 Yükləmələr": [1,2,3,4,5],
  "🎨 Bərpa & Media": [6,7,8,35],
  "🔍 Axtarış & Məlumat": [9,10,11,12,41,68],
  "🕌 Dini": [17,18,19,20,29],
  "📰 Xəbərlər & Gündəm": [21,22,23,24,31,28],
  "🌦 Hava, Bürc, Sağlamlıq": [25,26,27,14,70],
  "🧮 Xidmətlər & Hesablayıcılar": [30,38,39,40,45,46,47,48,53,54,55],
  "🌐 Vebmaster & Alətlər": [56,57,58,59,60,61,62,63,64,65,66,67],
  "👥 İnsanlar & Cəmiyyət": [13,32,33,34,71,69],
  "🎮 Əyləncə & Oyunlar": [15,16,50,51,52,78,79,80],
  "📚 Təhsil & Yazılar": [73,74,75,76,77,49]
};

function render(filter = '') {
  const container = document.getElementById('menuContainer');
  container.innerHTML = '';
  Object.keys(categories).forEach(cat => {
    const matched = categories[cat].filter(i => {
      const txt = (translations[currentLang]['m'+i] || '').toLowerCase();
      return !filter || txt.includes(filter.toLowerCase()) || String(i).includes(filter);
    });
    if(matched.length === 0) return;
    const sec = document.createElement('section');
    sec.className = 'list-section';
    sec.innerHTML = `<h3>${cat}</h3><ul class="menu"></ul>`;
    const ul = sec.querySelector('ul');
    matched.forEach(i => {
      const li = document.createElement('li');
      li.className = 'menu-item';
      li.innerHTML = `<a href="#" class="menu-link" onclick="openS(${i});return false;"><span class="num">${i}</span>${translations[currentLang]['m'+i]}</a>`;
      ul.appendChild(li);
    });
    container.appendChild(sec);
  });
}

function openS(id) {
    const v = document.getElementById('contentArea');
    document.getElementById('menuContainer').style.display = 'none';
    v.style.display = 'block';
    v.innerHTML = `<button class="btn" onclick="closeS()">⬅ Qayıt</button><h2>${translations[currentLang]['m'+id]}</h2><p>Məlumat yüklənir...</p>`;
}

function closeS() {
    document.getElementById('contentArea').style.display = 'none';
    document.getElementById('menuContainer').style.display = 'block';
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.onclick = function() {
    currentLang = this.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    tick(); render(document.getElementById('searchInput').value);
  };
});

document.getElementById('searchInput').oninput = (e) => render(e.target.value);
window.onload = () => {
    document.getElementById('searchInput').value = localStorage.getItem('azSearch') || '';
    render();
};
</script>
</body>
</html>
