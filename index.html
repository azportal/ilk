<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="yandex-verification" content="077145342cf7f4c9" />
  <title>AzPortal | Admin İdarəetməli</title>
  
  <style>
    :root{ --bg:#fff5f5; --panel:#ffffff; --accent:#d32f2f; --accent-alt:#1976d2; font-family: sans-serif; }
    body{ margin:0; background:var(--bg); }
    header { position:fixed; top:0; left:0; right:0; height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 12px; background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%); z-index:1000; color:white; }
    .wrap { max-width:720px; margin:60px auto; padding:12px; }
    .list-section { margin:15px 0; background:#fff; padding:10px; border-radius:8px; border-top:3px solid var(--accent); }
    .menu-item { border-bottom:1px solid #eee; list-style:none; }
    .menu-link { display:flex; padding:12px; text-decoration:none; color:#333; }
    .num { width:30px; color:var(--accent); font-weight:bold; }
    #adminPanel { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; color:white; padding:20px; overflow-y:auto; box-sizing:border-box; }
    input, textarea, select { width:100%; padding:10px; margin:5px 0 15px; border-radius:5px; border:none; }
    .btn { background:var(--accent); color:white; border:none; padding:10px; cursor:pointer; border-radius:5px; }
    #contentArea { display:none; background:white; padding:20px; border-radius:8px; margin-top:10px; }
  </style>
</head>
<body>

<header>
  <div onclick="adminTrigger()" style="cursor:pointer; font-weight:900;">AzPortal</div>
  <div>Admin İdarəetmə</div>
</header>

<main class="wrap">
  <div id="mainView">
    <div id="menuContainer"></div>
  </div>
  <div id="contentArea"></div>
</main>

<div id="adminPanel">
  <h3>🔐 Gelişmiş Admin Panel</h3>
  <input type="password" id="adminPass" placeholder="Şifrə">
  <button class="btn" onclick="loginAdmin()">Giriş</button>

  <div id="adminControls" style="display:none; margin-top:20px;">
    <hr>
    <h4>1. Yeni Bölmə (ID) Yarat/Dəyiş</h4>
    <label>ID nömrəsi:</label>
    <input type="number" id="editId" placeholder="Məsələn: 50">
    
    <label>Bölmənin Adı:</label>
    <input type="text" id="editTitle" placeholder="Məsələn: Whatsapp Plus">
    
    <label>Hansı Kateqoriyaya aid olsun?</label>
    <input type="text" id="editCat" placeholder="Məsələn: Whatsapp Bölümü">
    
    <label>Məzmun (Yükləmə linki və ya Reklam):</label>
    <textarea id="editContent" placeholder="Bura mətn və ya <a href='...'>link</a> yazın"></textarea>
    
    <button class="btn" onclick="saveNewSection()">Yadda Saxla</button>
    <button class="btn" style="background:gray;" onclick="clearData()">Sistemi Sıfırla (Ehtiyatlı ol!)</button>
  </div>
  <br>
  <button onclick="closeAdmin()" style="background:none; border:1px solid white; color:white; padding:10px; width:100%;">Bağla</button>
</div>

<script>
// Lokal yaddaşdan dataları götürək
let customData = JSON.parse(localStorage.getItem('azportal_data')) || {
  categories: { "Yükləmələr": [1,2,3], "Xəbərlər": [21,25] },
  titles: { 1:"Whatsapp Plus", 2:"Instagram Plus", 3:"Youtube Plus", 21:"Son Xəbərlər", 25:"Hava Proqnozu" },
  contents: {}
};

function renderMenu() {
  const container = document.getElementById('menuContainer');
  container.innerHTML = '';
  for(let cat in customData.categories) {
    let html = `<section class="list-section"><h3>${cat}</h3>`;
    customData.categories[cat].forEach(id => {
      html += `<div class="menu-item"><a href="#" class="menu-link" onclick="openSection(${id});return false;"><span class="num">${id}</span><span>${customData.titles[id] || 'Bölmə '+id}</span></a></div>`;
    });
    container.innerHTML += html + `</section>`;
  }
}

function openSection(id) {
  document.getElementById('mainView').style.display = 'none';
  const area = document.getElementById('contentArea');
  area.style.display = 'block';
  const content = customData.contents[id] || "Məlumat hazırlanır...";
  area.innerHTML = `<button class="btn" onclick="closeSection()">⬅ Qayıt</button><h2>${customData.titles[id]}</h2><div style="margin-top:20px;">${content}</div>`;
}

function closeSection() {
  document.getElementById('contentArea').style.display = 'none';
  document.getElementById('mainView').style.display = 'block';
}

// ADMIN FUNKSİYALARI
let clickCount = 0;
function adminTrigger() { clickCount++; if(clickCount >= 5) { document.getElementById('adminPanel').style.display = 'block'; clickCount = 0; } }
function loginAdmin() { if(document.getElementById('adminPass').value === 'azportal2026') document.getElementById('adminControls').style.display = 'block'; }

function saveNewSection() {
  const id = parseInt(document.getElementById('editId').value);
  const title = document.getElementById('editTitle').value;
  const cat = document.getElementById('editCat').value;
  const content = document.getElementById('editContent').value;

  if(!id || !title || !cat) return alert("Bütün xanaları doldurun!");

  // Kateqoriya yoxdursa yarat, varsa ID-ni ora əlavə et
  if(!customData.categories[cat]) customData.categories[cat] = [];
  if(!customData.categories[cat].includes(id)) customData.categories[cat].push(id);

  customData.titles[id] = title;
  customData.contents[id] = content;

  localStorage.setItem('azportal_data', JSON.stringify(customData));
  alert("Uğurla əlavə edildi!");
  renderMenu();
}

function clearData() { if(confirm("Bütün yaratdıqların silinsin?")) { localStorage.removeItem('azportal_data'); location.reload(); } }
function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

renderMenu();
</script>
</body>
</html>
