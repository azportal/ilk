
<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Azərbaycanda ən böyük onlayn portal. 80 bölmə, pulsuz xidmətlər, 5 dil." />
  <meta name="keywords" content="portal, whatsapp, instagram, youtube, tiktok, quran, hava, bürc, xəbərlər, dərman, oyunlar" />
  <title>AzPortal | İlk Azərbaycan Portalı</title>
  
  <style>
    :root{
      --bg:#fff5f5;
      --panel:#ffffff;
      --muted:#666;
      --accent:#d32f2f;
      --accent-alt:#1976d2;
      --border:#ffcccc;
      --touch:#ffe0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color:#0b1822;
    }
    html,body{height:100%;margin:0;background:var(--bg);-webkit-text-size-adjust:100%;}
    header {
      position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%);border-bottom:3px solid var(--accent);z-index:1000;box-shadow:0 4px 12px rgba(211,47,47,0.3);
    }
    .wrap { max-width:720px;margin:0 auto;padding:72px 12px 180px;}
    .brand { font-weight:900;color:#ffffff; font-size:14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .datetime { font-size:12px; color:#ffffff; text-align:right; min-width:60px; }
    .lang-switch { display:flex; gap:4px; align-items:center; }
    .lang-btn { padding:5px 8px; border-radius:5px; border:1px solid #ffffff; background:transparent; font-size:10px; cursor:pointer; color:#ffffff; font-weight:600; }
    .lang-btn.active { background:#ffffff; color:#d32f2f; }
    .searchbar { margin:6px 0 12px; display:flex; gap:6px; }
    .searchbar input{ flex:1;padding:10px 12px;border-radius:8px;border:2px solid var(--accent);font-size:14px;background:var(--panel);color:#d32f2f;}
    .btn { padding:8px 12px;border-radius:6px;border:2px solid var(--accent);background:var(--accent);font-size:13px;color:#ffffff;cursor:pointer;font-weight:600; }
    .list-section { margin:12px 0; border-top:3px solid var(--accent); padding:12px; background:linear-gradient(90deg, rgba(211,47,47,0.05) 0%, rgba(25,118,210,0.05) 100%); border-radius:8px; }
    .list-section h3 { margin:0 0 10px 0; font-size:13px; font-weight:900; color:var(--accent); text-transform:uppercase; }
    ul.menu { list-style:none;padding:0;margin:0; }
    li.menu-item { border-bottom:1px solid rgba(211,47,47,0.2); background:var(--panel); margin-bottom:6px; border-radius:6px; }
    a.menu-link { display:flex; align-items:center; gap:10px; padding:12px 10px; color:inherit; text-decoration:none; font-size:14px; font-weight:500; }
    a.menu-link:hover { background:var(--touch); }
    .num { width:25px; color:#d32f2f; flex-shrink:0; font-weight:900; }
    #contentArea { display:none; padding:15px; background:var(--panel); border:3px solid var(--accent); border-radius:8px; }
    .back-btn { padding:10px 14px; border-radius:6px; background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%); font-size:13px; color:#ffffff; text-decoration:none; display:inline-block; margin-bottom:15px; }
    .ads-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
    .ad-slot { width: 300px; height: 100px; background: #eee; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999; font-size: 12px; }
    footer { position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%); padding:12px; font-size:11px; color:#ffffff; text-align:center; z-index:1000; }
    footer a { color: #ffe0e0; text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <div style="display:flex;align-items:center;gap:8px;flex:1">
      <div class="brand">AzPortal</div>
      <nav class="lang-switch">
        <button class="lang-btn" data-lang="az">AZ</button>
        <button class="lang-btn" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </nav>
    </div>
    <div class="datetime" id="liveDate">00:00</div>
  </header>

  <main class="wrap">
    <div id="mainView">
      <div class="searchbar">
        <input id="searchInput" type="search" placeholder="Bölmə axtar..." />
        <button id="clearSearch" class="btn">X</button>
      </div>
      <div id="menuContainer"></div>
    </div>

    <div id="contentArea"></div>

    <div class="ads-container">
      <div class="ad-slot">REKLAM SAHƏSİ 1</div>
      <div class="ad-slot">REKLAM SAHƏSİ 2</div>
    </div>
  </main>

  <footer>
    <div>Müəllif: <strong>Azmi</strong> | © 2023-2026</div>
    <div><a href="sitemap.xml">Sitemap</a></div>
  </footer>

  <script>
    const translations = {
      az: { m1:"📥 Whatsapp Plus Yüklə", m2:"📥 Instagram Plus Yüklə", m3:"📥 Youtube Plus Yüklə", m21:"📰 Son Xəbərlər", m25:"🌦 Hava Proqnozu", m26:"♈ Bürclər", m30:"💱 Valyuta" /* ... digərləri */ },
      tr: { m1:"📥 Whatsapp Plus İndir", m2:"📥 Instagram Plus İndir", m3:"📥 Youtube Plus İndir", m21:"📰 Son Haberler", m25:"🌦 Hava Durumu", m26:"♈ Burçlar", m30:"💱 Döviz" },
      // Digər dilləri bura əlavə edə bilərsən
    };

    const categories = {
      "📥 Yükləmələr": [1, 2, 3],
      "📰 Xəbərlər & Gündəm": [21, 25, 26, 30]
    };

    let currentLang = 'az';

    function renderMenu(filter = '') {
      const container = document.getElementById('menuContainer');
      container.innerHTML = '';
      Object.keys(categories).forEach(cat => {
        const ids = categories[cat].filter(id => {
          const text = (translations[currentLang]['m'+id] || '').toLowerCase();
          return text.includes(filter.toLowerCase());
        });
        if (ids.length === 0) return;
        
        let html = `<section class="list-section"><h3>${cat}</h3><ul class="menu">`;
        ids.forEach(id => {
          html += `<li class="menu-item"><a href="#" class="menu-link" onclick="openSection(${id})">
                   <span class="num">${id}</span><span>${translations[currentLang]['m'+id]}</span></a></li>`;
        });
        html += `</ul></section>`;
        container.innerHTML += html;
      });
    }

    window.openSection = (id) => {
      document.getElementById('mainView').style.display = 'none';
      const area = document.getElementById('contentArea');
      area.style.display = 'block';
      area.innerHTML = `<a href="#" class="back-btn" onclick="closeSection()">⬅ Qayıt</a>
                        <h2>${translations[currentLang]['m'+id]}</h2>
                        <div style="background:#f9f9f9; padding:15px; border-radius:8px;">
                        Bu bölmə hazırda aktivləşdirilir...</div>`;
    };

    window.closeSection = () => {
      document.getElementById('mainView').style.display = 'block';
      document.getElementById('contentArea').style.display = 'none';
    };

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLang = btn.dataset.lang;
        renderMenu();
      };
    });

    document.getElementById('searchInput').oninput = (e) => renderMenu(e.target.value);
    document.getElementById('clearSearch').onclick = () => { document.getElementById('searchInput').value = ''; renderMenu(); };

    setInterval(() => {
      const d = new Date();
      document.getElementById('liveDate').innerText = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }, 1000);

    renderMenu();
    document.querySelector('[data-lang="az"]').classList.add('active');
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDyjq7G64xJW_dPfy_cZ-kfLehKRpewagA",
      authDomain: "azportal.firebaseapp.com",
      projectId: "azportal",
      storageBucket: "azportal.firebasestorage.app",
      messagingSenderId: "443229690062",
      appId: "1:443229690062:web:2860cfbb08d076bce7189f",
      measurementId: "G-5E07WQTLLC"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
  </script>
</body>
</html>
