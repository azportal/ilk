<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="https://azportal.github.io/ilk/ — Azərbaycanda ən böyük onlayn portal. 80 bölmə, pulsuz xidmətlər, 5 dil." />
  <meta name="keywords" content="portal, whatsapp, instagram, youtube, tiktok, quran, hava, bürc, xəbərlər, dərman, oyunlar" />
  <title>https://azportal.github.io/ilk/</title>
  
  <style>
    /* Sənin bütün orijinal CSS-in bura daxildir */
    :root{
      --bg:#fff5f5; --panel:#ffffff; --muted:#666; --accent:#d32f2f; --accent-alt:#1976d2; --border:#ffcccc; --touch:#ffe0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color:#0b1822;
    }
    html,body{height:100%;margin:0;background:var(--bg);-webkit-text-size-adjust:100%;}
    header {
      position:fixed;top:0;left:0;right:0;height:70px; /* Saat üçün bir az hündür edildi */
      display:flex;align-items:center;justify-content:space-between;padding:0 12px;
      background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%);border-bottom:3px solid var(--accent);z-index:1000;
    }
    .wrap { max-width:720px;margin:0 auto;padding:85px 12px 140px;}
    .brand { font-weight:900;color:#ffffff; font-size:16px; }
    .datetime { font-size:12px; color:#ffffff; text-align:right; }
    .lang-switch { display:flex; gap:4px; margin-top:5px; }
    .lang-btn { padding:4px 6px; border-radius:4px; border:1px solid #ffffff; background:transparent; font-size:10px; cursor:pointer; color:#ffffff; }
    .lang-btn.active { background:#ffffff; color:#d32f2f; }
    .searchbar { margin:6px 0 12px; display:flex; gap:6px; }
    .searchbar input{ flex:1;padding:10px 12px;border-radius:8px;border:2px solid var(--accent);font-size:14px;background:var(--panel);}
    .btn { padding:8px 12px;border-radius:6px;border:2px solid var(--accent);background:var(--accent);font-size:13px;color:#ffffff;font-weight:600; cursor:pointer; }
    .list-section { margin:12px 0; border-top:3px solid var(--accent); padding:12px; background:linear-gradient(90deg, rgba(211,47,47,0.05) 0%, rgba(25,118,210,0.05) 100%); border-radius:8px; }
    .list-section h3 { margin:0 0 10px 0; font-size:13px; font-weight:900; color:var(--accent); text-transform:uppercase; }
    ul.menu { list-style:none;padding:0;margin:0; }
    li.menu-item { border-bottom:1px solid rgba(211,47,47,0.2); background:var(--panel); margin-bottom:6px; border-radius:6px; }
    a.menu-link { display:flex; align-items:center; gap:10px; padding:12px 10px; color:inherit; text-decoration:none; font-size:14px; }
    .num { width:30px; color:#d32f2f; font-weight:900; }
    footer { position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%);border-top:3px solid var(--accent);padding:10px;font-size:11px;color:#ffffff;text-align:center;z-index:1000; }
    .admin-link { color: #ffd700; cursor: pointer; text-decoration: underline; margin-left: 10px; }
  </style>
</head>
<body>

  <header>
    <div style="display:flex; flex-direction:column; flex:1">
      <div class="brand">AzPortal</div>
      <div id="dynamicGreet" style="color:white; font-size:13px; font-weight:bold;">Yüklənir...</div>
      <nav class="lang-switch" id="langNav">
        <button class="lang-btn active" data-lang="az">AZ</button>
        <button class="lang-btn" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="ua">UA</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </nav>
    </div>
    <div class="datetime">
      <div id="liveClock" style="font-size:16px; font-weight:900;">00:00:00</div>
      <div id="liveDate" style="font-size:10px;">-- --- ----</div>
    </div>
  </header>

  <main class="wrap" id="app">
    <div id="adminAdsSlot" style="text-align:center; margin-bottom:10px;"></div>

    <div class="searchbar">
      <input id="searchInput" type="search" placeholder="Axtar..." />
      <button id="clearSearch" class="btn">X</button>
    </div>

    <div id="dynamicSectionsArea"></div>

    <div id="menuContainer"></div>
    <div id="contentArea" style="display:none;"></div>
  </main>

  <footer>
    <div>Müəllif: <strong>Azmi</strong> | © 2026 | <span class="admin-link" onclick="openAdmin()">Admin Giriş</span></div>
    <div style="margin-top:5px;">
        <a href="/sitemap.xml" style="color:#fff; text-decoration:none;">Sitemap</a> | 
        <a href="/maps" style="color:#fff; text-decoration:none;">Google Maps</a>
    </div>
  </footer>

<script>
// ADMIN ŞİFRƏSİ: Tural 0101
function openAdmin() {
    let pass = prompt("Admin Şifrəsini daxil edin:");
    if(pass === "Tural 0101") {
        alert("Giriş uğurludur! İndi reklam və bölmələri idarə edə bilərsiniz.");
        // Bura admin panel funksiyalarını bağlaya bilərsən
    } else {
        alert("Şifrə yanlışdır!");
    }
}

// QARŞILAMA VƏ SAAT (DİNAMİK)
const ui = {
  az: { m:"Sabahınız xeyir", a:"Günortanız xeyir", e:"Axşamınız xeyir", n:"Gecəniz xeyrə", w:"xoş gəldiniz!", loc:'az-AZ' },
  tr: { m:"Günaydın", a:"Tünaydın", e:"İyi akşamlar", n:"İyi geceler", w:"hoş geldiniz!", loc:'tr-TR' },
  ru: { m:"Доброе утро", a:"Добрый день", e:"Добрый вечер", n:"Доброй ночи", w:"добро пожаловать!", loc:'ru-RU' },
  ua: { m:"Доброго ранку", a:"Доброго дня", e:"Доброго вечора", n:"На добраніч", w:"ласкаво просимо!", loc:'uk-UA' },
  en: { m:"Good morning", a:"Good afternoon", e:"Good evening", n:"Good night", w:"welcome!", loc:'en-US' }
};

let currentLang = 'az';

function updateHeader() {
  const now = new Date();
  const h = now.getHours();
  const l = ui[currentLang];
  let g = (h>=5 && h<12)?l.m : (h>=12 && h<18)?l.a : (h>=18 && h<23)?l.e : l.n;
  document.getElementById('dynamicGreet').innerText = g + ", " + l.w;
  document.getElementById('liveClock').innerText = now.toLocaleTimeString(l.loc);
  document.getElementById('liveDate').innerText = now.toLocaleDateString(l.loc, {weekday:'short', day:'numeric', month:'short'});
}
setInterval(updateHeader, 1000); updateHeader();

// SƏNİN 80 KATEQORİYAN (TOXUNULMADI, HAMISI QALDI)
const translations = {
  az: { m1:"📥 Whatsapp Plus Yüklə", m2:"📥 Instagram Plus Yüklə", m3:"📥 Youtube Plus Yüklə", m4:"📥 TikTok Plus Yüklə", m5:"🔐 ArgoVPN Pro Yüklə", m6:"🖼 Silinmiş şəkillərin geri qaytarılması", m7:"🎵 Mahnı Axtar", m8:"🔎 Şəkil Axtar", m9:"🔗 Lazımlı Linklər", m10:"ℹ️ İnformasiya", m11:"📚 Wikipedia-da Axtar", m12:"🔍 Ümumi Axtarış", m13:"📱 Tanınmış Simlar", m14:"💊 Dərman Axtar", m15:"🎬 Kinolar", m16:"📺 Seriallar", m17:"🕌 Quranı Kərim - Səsli(Az)", m18:"🕌 Quranı Kərim - Səsli(TR)", m19:"🕌 Quranı Kərim - Səsli(RU)", m20:"🕌 Quranı Kərim - Səsli(AR)", m21:"📰 Ən Son Xəbərlər", m22:"🗞 Xəbər Lenti", m23:"🌟 Show Biznes", m24:"🌍 Qarışıq Xəbərlər", m25:"🌦 Gündəlik Hava", m26:"♈ Gündəlik Bürclər", m27:"🦠 COVID-19", m28:"⚽ İdman Xəbərləri", m29:"🕋 Namaz vaxtları", m30:"💱 Valyuta", m31:"📊 Gündəm Məlumatlar", m32:"👩 Qadın Dünyası", m33:"👨 Kişi Dünyası", m34:"❤️ Sevgi Aləmi", m35:"🖼 Status Şəkilləri", m36:"🧠 Psixologiya", m37:"🧩 Psixoloji Testlər", m38:"💡 Elektrik", m39:"🔥 Qaz", m40:"💧 Su", m41:"🌐 Online Tərcümə", m42:"♓ Bürc Yoxla", m43:"✨ Bürclərin Sirri", m44:"🗺 Online Xəritə", m45:"🎂 Doğum günü", m46:"📅 Hansı gün", m47:"⚖️ Çəki Hesabla", m48:"📝 İmtahan", m49:"✍️ Mətni Yaz", m50:"❌⭕ X - O", m51:"♟ Dama", m52:"🔮 Online Sehr", m53:"📐 Tənlik", m54:"🧮 Hesablayıcı", m55:"💰 Maaş", m56:"📡 Web Skaner", m57:"🌍 Domen Yoxla", m58:"💳 Webmoney", m59:"🌐 Domenler", m60:"📍 İP Axtar", m61:"💻 Kodlaşdırma", m62:"⚙️ Qrab", m63:"🔣 Simvol", m64:"🔤 Hərf", m65:"🎨 Rəng", m66:"🙂 Smayl", m67:"🔘 Button", m68:"🤔 Maraq", m69:"💄 Moda", m70:"🏥 Sağlamlıq", m71:"👨‍👩‍👧 Ailə", m72:"🍲 Mətbəx", m73:"📖 Dərsliklər", m74:"📘 Peşə", m75:"📝 İnşalar", m76:"📜 Atalar Sözü", m77:"💬 Aforizmler", m78:"❓ Tapmacalar", m79:"😂 Lətifələr", m80:"🧚 Nağıllar" },
  tr: { /* TR tərcümələrin bura gəlir... */ },
  ru: { /* RU tərcümələrin bura gəlir... */ },
  ua: { /* UA tərcümələrin bura gəlir... */ },
  en: { /* EN tərcümələrin bura gəlir... */ }
};

const categories = {
  "📥 Yükləmələr": [1,2,3,4,5],
  "🎨 Bərpa & Media": [6,7,8,35],
  "🔍 Axtarış & Məlumat": [9,10,11,12,41,68],
  "🕌 Dini": [17,18,19,20,29],
  "📰 Xəbərlər & Gündəm": [21,22,23,24,31,28],
  "🌦 Hava, Bürc, Sağlamlıq": [25,26,27,14,70],
  "🧮 Xidmətlər & Hesablayıcılar": [30,38,39,40,45,46,47,48,53,54,55],
  "🌐 Vebmaster & Alətlər": [56,57,58,59,60,61,62,63,64,65,66,67],
  "👥 İnsanlar & Cəmiyyət": [13,32,33,34,71,69],
  "🎮 Əyləncə & Oyunlar": [15,16,50,51,52,78,79,80],
  "📚 Təhsil & Yazılar": [73,74,75,76,77,49]
};

// SƏNİN MENYU RENDERING FUNKSİYAN (TOXUNULMADI)
function renderMenu(filter = '') {
  const container = document.getElementById('menuContainer');
  container.innerHTML = '';
  Object.keys(categories).forEach(cat => {
    const matched = categories[cat].filter(i => {
      const txt = (translations[currentLang]['m'+i] || '').toLowerCase();
      return !filter || txt.includes(filter.toLowerCase()) || String(i).includes(filter);
    });
    if(matched.length === 0) return;
    const sec = document.createElement('section');
    sec.className = 'list-section';
    sec.innerHTML = `<h3>${cat}</h3><ul class="menu"></ul>`;
    const ul = sec.querySelector('ul');
    matched.forEach(i => {
      const li = document.createElement('li');
      li.className = 'menu-item';
      li.innerHTML = `<a href="#" class="menu-link" onclick="openSection(${i});return false;"><span class="num">${i}</span><span class="title">${translations[currentLang]['m'+i]}</span></a>`;
      ul.appendChild(li);
    });
    container.appendChild(sec);
  });
}

function openSection(id) {
    document.getElementById('contentArea').style.display = 'block';
    document.getElementById('menuContainer').style.display = 'none';
    document.getElementById('contentArea').innerHTML = `<button class="btn" onclick="showMenu()">⬅️ Qayıt</button><h2>${id}. ${translations[currentLang]['m'+id]}</h2><div class="card">Məlumat yüklənir...</div>`;
    window.scrollTo(0,0);
}

function showMenu() {
    document.getElementById('contentArea').style.display = 'none';
    document.getElementById('menuContainer').style.display = 'block';
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    currentLang = this.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    updateHeader();
    renderMenu(document.getElementById('searchInput').value);
  });
});

document.getElementById('searchInput').addEventListener('input', (e) => renderMenu(e.target.value));
document.getElementById('clearSearch').addEventListener('click', () => { document.getElementById('searchInput').value = ''; renderMenu(); });

renderMenu();
</script>
</body>
</html>
