  <style>
    :root{
      --bg:#fff5f5;
      --panel:#ffffff;
      --muted:#666;
      --accent:#d32f2f;
      --accent-alt:#1976d2;
      --border:#ffcccc;
      --touch:#ffe0e0;
      --wa-color:#25D366;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color:#0b1822;
    }
    html,body{height:100%;margin:0;background:var(--bg);-webkit-text-size-adjust:100%;}
    header {
      position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%);border-bottom:3px solid var(--accent);z-index:1000;box-shadow:0 4px 12px rgba(211,47,47,0.3);
    }
    .wrap { max-width:720px;margin:0 auto;padding:72px 12px 180px;}
    .brand { font-weight:900;color:#ffffff; font-size:16px; }
    .datetime { font-size:12px; color:#ffffff; text-align:right; min-width:120px; }
    .lang-switch { display:flex; gap:4px; align-items:center; }
    .lang-btn { padding:5px 8px; border-radius:5px; border:2px solid #ffffff; background:transparent; font-size:11px; cursor:pointer; color:#ffffff; font-weight:600; }
    .lang-btn.active { background:#ffffff; color:#d32f2f; }
    .searchbar { margin:6px 0 12px; display:flex; gap:6px; }
    .searchbar input{ flex:1;padding:10px 12px;border-radius:8px;border:2px solid var(--accent);font-size:14px;background:var(--panel);color:#d32f2f;}
    .btn { padding:8px 12px;border-radius:6px;border:2px solid var(--accent);background:var(--accent);font-size:13px;color:#ffffff;cursor:pointer;font-weight:600; text-decoration: none; display: inline-block; }
    .btn:hover { background:#b71c1c; opacity: 0.9; }
    .list-section { margin:12px 0; border-top:3px solid var(--accent); padding:12px; background:linear-gradient(90deg, rgba(211,47,47,0.05) 0%, rgba(25,118,210,0.05) 100%); border-radius:8px; }
    .list-section h3 { margin:0 0 10px 0; font-size:13px; font-weight:900; color:var(--accent); text-transform:uppercase; }
    ul.menu { list-style:none;padding:0;margin:0; }
    li.menu-item { border-bottom:1px solid rgba(211,47,47,0.2); background:var(--panel); margin-bottom:6px; border-radius:6px; box-shadow:0 2px 6px rgba(211,47,47,0.1); }
    a.menu-link { display:flex; align-items:center; gap:10px; padding:12px 10px; color:inherit; text-decoration:none; font-size:14px; font-weight:500; }
    a.menu-link:hover { background:var(--touch); transform:translateX(4px); }
    .num { width:32px; color:#d32f2f; flex-shrink:0; font-weight:900; }
    .title { flex:1; }
    #contentArea { display:none; padding:12px; background:var(--panel); border:3px solid var(--accent); border-radius:8px; }
    #contentArea h2 { margin:0 0 12px 0; font-size:16px; color:var(--accent); }
    .back-btn { padding:10px 14px;border-radius:6px;border:2px solid var(--accent);background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%);font-size:13px;color:#ffffff;text-decoration:none;cursor:pointer;font-weight:600;margin:0 0 12px 0;display:inline-block; }
    .card { padding:12px;border-radius:8px;border:2px solid var(--accent);background:linear-gradient(135deg, #fff5f5 0%, #e3f2fd 100%); margin-bottom:12px; }
    .card p { margin:0 0 10px 0; font-size:14px; }
    footer {
      position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg, #d32f2f 0%, #1976d2 100%);border-top:3px solid var(--accent);padding:12px 12px;font-size:11px;color:#ffffff;text-align:center;z-index:1000;font-weight:600;
    }
    footer a { color: #ffe0e0; text-decoration: none; }
    
    .dl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
    
    .ads-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
    .ad-slot { width: 300px; height: 100px; background: #eee; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999; font-size: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;gap:8px;flex:1">
      <div class="brand">https://azportal.github.io/ilk/</div>
      <nav class="lang-switch" id="langNav">
        <button class="lang-btn" data-lang="az">AZ</button>
        <button class="lang-btn" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="ua">UA</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </nav>
    </div>
    <div class="datetime" id="liveDate">--:--</div>
  </header>

  <main class="wrap" id="app">
    <div class="searchbar">
      <input id="searchInput" type="search" placeholder="Axtar..." />
      <button id="clearSearch" class="btn">Təmizlə</button>
    </div>
    <div id="menuContainer"></div>
    <div id="contentArea"></div>
    
    <div class="ads-container">
      <div class="ad-slot">Reklam Sahəsi 1</div>
      <div class="ad-slot">Reklam Sahəsi 2</div>
    </div>
  </main>

  <footer>
    <div style="margin-bottom: 4px;">Müəllif: <strong>Azmi</strong> | © 2023-2026</div>
    <div><a href="sitemap.html">Sayt Xəritəsi (Sitemap)</a></div>
  </footer>

<script>
const translations = {
  az: {
    m1:"📥 Whatsapp Plus Yüklə", m2:"📥 Instagram Plus Yüklə", m3:"📥 Youtube Plus Yüklə", m4:"📥 TikTok Plus Yüklə", m5:"🔐 ArgoVPN Pro Yüklə",
    m6:"🖼 Silinmiş şəkillərin geri qaytarılması", m7:"🎵 Mahnı Axtar", m8:"🔎 Şəkil Axtar", m9:"🔗 Lazımlı Linklər", m10:"ℹ️ İnformasiya",
    m11:"📚 Wikipedia-da Axtar", m12:"🔍 Ümumi Axtarış", m13:"📱 Tanınmış Simlar", m14:"💊 Dərman Axtar", m15:"🎬 Kinolar",
    m16:"📺 Seriallar", m17:"🕌 Quranı Kərim - Səsli(Az)", m18:"🕌 Quranı Kərim - Səsli(TR)", m19:"🕌 Quranı Kərim - Səsli(RU)", m20:"🕌 Quranı Kərim - Səsli(AR)",
    m21:"📰 Ən Son Xəbərlər", m22:"🗞 Xəbər Lenti", m23:"🌟 Show Biznes", m24:"🌍 Qarışıq Xəbərlər", m25:"🌦 Gündəlik Hava",
    m26:"♈ Gündəlik Bürclər", m27:"🦠 COVID-19", m28:"⚽ İdman Xəbərləri", m29:"🕋 Namaz vaxtları", m30:"💱 Valyuta",
    m31:"📊 Gündəm Məlumatlar", m32:"👩 Qadın Dünyası", m33:"👨 Kişi Dünyası", m34:"❤️ Sevgi Aləmi", m35:"🖼 Status Şəkilləri",
    m36:"🧠 Psixologiya", m37:"🧩 Psixoloji Testlər", m38:"💡 Elektrik", m39:"🔥 Qaz", m40:"💧 Su",
    m41:"🌐 Online Tərcümə", m42:"♓ Bürc Yoxla", m43:"✨ Bürclərin Sirri", m44:"🗺 Online Xəritə", m45:"🎂 Doğum günü",
    m46:"📅 Hansı gün", m47:"⚖️ Çəki Hesabla", m48:"📝 İmtahan", m49:"✍️ Mətni Yaz", m50:"❌⭕ X - O",
    m51:"♟ Dama", m52:"🔮 Online Sehr", m53:"📐 Tənlik", m54:"🧮 Hesablayıcı", m55:"💰 Maaş",
    m56:"📡 Web Skaner", m57:"🌍 Domen Yoxla", m58:"💳 Webmoney", m59:"🌐 Domenler", m60:"📍 İP Axtar",
    m61:"💻 Kodlaşdırma", m62:"⚙️ Qrab", m63:"🔣 Simvol", m64:"🔤 Hərf", m65:"🎨 Rəng",
    m66:"🙂 Smayl", m67:"🔘 Button", m68:"🤔 Maraq", m69:"💄 Moda", m70:"🏥 Sağlamlıq",
    m71:"👨‍👩‍👧 Ailə", m72:"🍲 Mətbəx", m73:"📖 Dərsliklər", m74:"📘 Peşə", m75:"📝 İnşalar",
    m76:"📜 Atalar Sözü", m77:"💬 Aforizmler", m78:"❓ Tapmacalar", m79:"😂 Lətifələr", m80:"🧚 Nağıllar"
  }
  // Digər dillər eynidir...
};

const categories = {
  "📥 Yükləmələr": [1,2,3,4,5],
  "🎨 Bərpa & Media": [6,7,8,35],
  "🔍 Axtarış & Məlumat": [9,10,11,12,41,68],
  "🕌 Dini": [17,18,19,20,29],
  "📰 Xəbərlər & Gündəm": [21,22,23,24,31,28],
  "🌦 Hava, Bürc, Sağlamlıq": [25,26,27,14,70],
  "🧮 Xidmətlər & Hesablayıcılar": [30,38,39,40,45,46,47,48,53,54,55],
  "🌐 Vebmaster & Alətlər": [56,57,58,59,60,61,62,63,64,65,66,67],
  "👥 İnsanlar & Cəmiyyət": [13,32,33,34,71,69],
  "🎮 Əyləncə & Oyunlar": [15,16,50,51,52,78,79,80],
  "📚 Təhsil & Yazılar": [73,74,75,76,77,49]
};

let currentLang = 'az';
const menuContainer = document.getElementById('menuContainer');
const contentArea = document.getElementById('contentArea');
const searchInput = document.getElementById('searchInput');

function t(key) { return (translations[currentLang] || translations['az'])[key] || key; }
function esc(str) { return (str+'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function updateClock() {
  const d = new Date();
  document.getElementById('liveDate').textContent = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}
setInterval(updateClock, 1000); updateClock();

function renderMenu(filterText = '') {
  menuContainer.innerHTML = '';
  Object.keys(categories).forEach(catName => {
    const ids = categories[catName];
    const matched = ids.filter(i => (t('m'+i)||'').toLowerCase().includes(filterText.toLowerCase()));
    if(matched.length === 0) return;
    const sec = document.createElement('section'); sec.className = 'list-section';
    sec.innerHTML = `<h3>${catName}</h3><ul class="menu"></ul>`;
    const ul = sec.querySelector('ul');
    matched.forEach(i => {
      const li = document.createElement('li'); li.className = 'menu-item';
      li.innerHTML = `<a href="#" class="menu-link" onclick="openSection(${i});return false;"><span class="num">${i}</span><span class="title">${esc(t('m'+i))}</span></a>`;
      ul.appendChild(li);
    });
    menuContainer.appendChild(sec);
  });
}

function openSection(id) {
  contentArea.style.display = 'block';
  menuContainer.style.display = 'none';
  
  let html = `<a class="back-btn" href="#" onclick="return showMenu(event)">⬅️ Qayıt</a><h2>${id}. ${esc(t('m'+id))}</h2>`;
  
  if(id === 1) { // WHATSAPP XÜSUSİ MƏZMUN
    html += `
      <div class="card" style="border-left:5px solid var(--wa-color)">
        <p><strong>WhatsApp Messenger</strong> — Dünyanın ən populyar mesajlaşma tətbiqi ilə pulsuz zənglər edin və mesajlaşın.</p>
        <p style="font-size:13px">Rəsmi sayt məlumatları əsasında son versiya linkləri:</p>
        <div class="dl-grid">
          <a href="https://play.google.com/store/apps/details?id=com.whatsapp" target="_blank" class="btn" style="background:#25D366;border:0">Android Play Store</a>
          <a href="https://apps.apple.com/app/whatsapp-messenger/id310633997" target="_blank" class="btn" style="background:#000;border:0">iPhone App Store</a>
          <a href="https://web.whatsapp.com/desktop/windows/release/x64/WhatsAppSetup.exe" target="_blank" class="btn" style="background:#00a4ef;border:0">Windows PC</a>
          <a href="https://web.whatsapp.com/desktop/mac/files/WhatsApp.dmg" target="_blank" class="btn" style="background:#555;border:0">Mac OS</a>
        </div>
        <p style="margin-top:15px; font-weight:bold; color:var(--accent);">WhatsApp Plus (Reklamlı Link):</p>
        <a href="ÖZ_REKLAM_LİNKİNİ_BURA_QOY" target="_blank" class="btn" style="width:100%; text-align:center; background:linear-gradient(135deg, #d32f2f, #1976d2); border:0">📥 Sürətli Yüklə (Plus Versiya)</a>
      </div>`;
  } else {
    html += `<div class="card"><p>${esc(t('m'+id))}</p></div>`;
  }
  
  contentArea.innerHTML = html;
  window.scrollTo(0,0);
}

function showMenu(e) { if(e) e.preventDefault(); contentArea.style.display = 'none'; menuContainer.style.display = 'block'; return false; }

searchInput.addEventListener('input', () => renderMenu(searchInput.value.trim()));
document.getElementById('clearSearch').addEventListener('click', () => { searchInput.value = ''; renderMenu(); });

renderMenu();
</script>
</body>
</html>
